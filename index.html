<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Free Fire Items Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #040d1f;
      --text: #e0e8f2;
      --card: #071932;
      --muted: #9cb8d6;
      --accent: #4a78c2;
      --border: rgba(255, 255, 255, 0.09);
      --radius: 12px;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Roboto, sans-serif;
      padding: 20px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .header-container {
      background: linear-gradient(145deg, var(--card), #051329);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 25px 15px;
      margin-bottom: 25px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      position: relative;
    }

    .titles-wrapper {
      text-align: center;
      z-index: 1;
      width: 100%;
    }

    .main-title {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(1.2rem, 4.5vw, 2.8rem);
      font-weight: 900;
      margin-bottom: 5px;
      background: linear-gradient(to right, #e0e8f2, #4a78c2, #e0e8f2);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      letter-spacing: 2px;
      white-space: nowrap;
      animation: titleShine 3s linear infinite;
    }

    @keyframes titleShine { to { background-position: 200% center; } }

    .subtitle-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .sub-title {
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: #FFD700;
      letter-spacing: 1px;
      animation: glowEffect 1.5s ease-in-out infinite alternate;
    }

    @keyframes glowEffect {
      from { text-shadow: 0 0 5px #FFD700, 0 0 10px #FFD700; }
      to { text-shadow: 0 0 15px #FFD700, 0 0 25px #FF8C00; }
    }

    .music-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .music-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.1);
    }

    .controls-wrapper {
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 1;
    }

    .search-wrapper {
      position: relative;
      display: flex;
      width: 100%;
    }

    .search-share-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--border);
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .search-share-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .filters-row {
      display: flex;
      flex-direction: row;
      gap: 8px;
    }

    input[type="text"], select {
      border-radius: 8px;
      border: 1px solid var(--border); 
      background: rgba(0, 0, 0, 0.4);
      color: var(--text); 
      outline: none; 
      transition: border-color 0.3s;
    }
    
    input[type="text"] { 
      width: 100%; 
      padding: 14px; 
      padding-right: 50px;
      font-size: 0.95rem; 
    }
    
    .filters-row select {
      flex: 1; 
      min-width: 0; 
      padding: 12px 5px; 
      font-size: 0.7rem;
      cursor: pointer;
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow: hidden;
    }

    input[type="text"]:focus, select:focus { border-color: var(--accent); }

    .grid {
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 12px;
      padding-bottom: 20px;
    }

    .card {
      border: 1px solid var(--border); 
      border-radius: var(--radius);
      overflow: hidden; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      background-size: cover;
      background-position: center; 
      position: relative; 
      cursor: pointer;
      aspect-ratio: 1 / 1; 
      padding: 10%; 
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      animation: fadeIn 0.5s ease backwards;
    }
    
    .card:hover { 
      transform: translateY(-5px) scale(1.05); 
      border-color: var(--accent); 
      box-shadow: 0 8px 20px rgba(0,0,0,0.7), 0 0 15px rgba(74, 120, 194, 0.3);
      z-index: 10; 
    }
    
    .card-icon {
      width: 90%; 
      height: 90%; 
      object-fit: contain; 
      z-index: 2; 
      transition: transform 0.3s ease;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
    }

    .card:hover .card-icon { transform: scale(1.1) rotate(2deg); }
    
    .card-icon.weapon-tilt { transform: rotate(25deg) scale(1.4) !important; }
    .card:hover .card-icon.weapon-tilt { transform: rotate(20deg) scale(1.5) !important; }

    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 8px; margin-top: 10px; margin-bottom: 40px; flex-wrap: wrap;
    }

    .page-btn {
      background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: 8px;
      cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 700;
      transition: all 0.2s ease;
    }

    .page-btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .empty-state {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 50px 20px; margin: 20px auto; max-width: 500px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5); text-align: center; animation: fadeIn 0.5s ease;
    }
    
    .empty-icon { color: var(--muted); margin-bottom: 20px; animation: floatIcon 3s ease-in-out infinite; }
    
    .empty-title {
      font-family: 'Montserrat', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 10px;
      background: linear-gradient(90deg, #ef4444, #f87171); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: pulseGlow 2s infinite alternate;
    }
    
    .empty-desc { color: var(--muted); font-size: 0.95rem; margin-bottom: 35px; font-family: 'Poppins', sans-serif; }
    
    .empty-socials-wrapper { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px; width: 100%; }
    
    .socials-title {
      font-family: 'Poppins', sans-serif; font-size: 0.85rem; color: #FFD700; margin-bottom: 20px;
      animation: glowEffect 1.5s ease-in-out infinite alternate; text-transform: uppercase; letter-spacing: 1px;
    }
    
    .social-icons { display: flex; justify-content: center; gap: 20px; }
    
    .social-btn {
      display: flex; align-items: center; justify-content: center;
      width: 50px; height: 50px; border-radius: 12px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--text); transition: all 0.3s ease; text-decoration: none;
    }
    
    .social-btn.instagram:hover { 
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      border-color: transparent; transform: translateY(-4px) scale(1.1); box-shadow: 0 5px 15px rgba(220, 39, 67, 0.4); 
    }
    .social-btn.telegram:hover { 
      background: #0088cc; border-color: transparent; 
      transform: translateY(-4px) scale(1.1); box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4); 
    }
    .social-btn.linktree:hover { 
      background: #43E660; color: #000; border-color: transparent; 
      transform: translateY(-4px) scale(1.1); box-shadow: 0 5px 15px rgba(67, 230, 96, 0.4); 
    }

    @keyframes pulseGlow { from { text-shadow: 0 0 10px rgba(239, 68, 68, 0.2); } to { text-shadow: 0 0 20px rgba(239, 68, 68, 0.6); } }

    .modal {
      display: none; position: fixed; z-index: 100; left: 0; top: 0;
      width: 100%; height: 100%; background-color: rgba(2, 6, 15, 0.85);
      backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 20px;
    }
    
    .modal-content {
      background: rgba(7, 25, 50, 0.9); backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; 
      padding: 30px 25px; width: 100%; max-width: 450px;
      position: relative; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .close-btn {
      position: absolute; top: 20px; right: 30px; color: #fff;
      font-size: 45px; cursor: pointer; font-weight: bold; transition: all 0.2s;
      z-index: 101; text-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    
    .close-btn:hover { color: #ef4444; transform: scale(1.1) rotate(90deg); }
    
    .modal-icon-container {
      width: 100%; height: 200px; display: flex; justify-content: center;
      align-items: center; margin-bottom: 25px; border-radius: var(--radius);
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.3) 100%);
      border: 1px dashed rgba(255,255,255,0.1);
    }
    
    .modal-float-wrapper {
      display: flex; justify-content: center; align-items: center;
      width: 100%; height: 100%;
      animation: floatWrapper 3s ease-in-out infinite;
    }

    @keyframes floatWrapper { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }

    .modal-icon { 
      max-width: 180px; max-height: 180px; object-fit: contain; 
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.7));
    }

    .modal-icon.weapon-tilt { transform: rotate(25deg) scale(1.4); }
    .modal-icon.unknown-scale { transform: scale(0.3); }
    
    .modal-title { 
      text-align: center; margin-bottom: 20px; font-family: Montserrat, sans-serif; 
      color: #fff; white-space: nowrap; width: 100%; padding-bottom: 5px;
    }

    .modal-details {
      background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05); width: 100%;
    }

    .single-line-text {
      display: flex; align-items: center; white-space: nowrap;
      margin-bottom: 12px; padding-bottom: 4px; width: 100%;
    }

    .multi-line-text { margin-bottom: 0; line-height: 1.6; word-wrap: break-word; white-space: normal; display: block; }
    .multi-line-text strong { color: #fff; margin-right: 8px; font-size: 0.95rem; }
    .multi-line-text span { color: var(--muted); font-size: 0.8rem; white-space: normal; word-wrap: break-word; display: inline; }

    .modal-details strong { color: #fff; margin-right: 8px; flex-shrink: 0; font-size: 0.95rem; }
    .modal-details span { color: var(--muted); font-size: 0.8rem; }

    .copy-btn {
      background: transparent; border: none; color: var(--accent);
      margin-left: 8px; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      padding: 4px; border-radius: 4px;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .modal-actions {
      display: flex; flex-direction: row; justify-content: center;
      gap: 15px; margin-top: 25px;
    }

    .modal-btn {
      color: #fff; border: none; width: 50px; height: 50px;
      border-radius: 12px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .btn-share { background: linear-gradient(135deg, #10b981, #059669); }
    .btn-dl-icon { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .btn-dl-bg { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }

    .modal-btn:hover { transform: translateY(-3px) scale(1.05); }

    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes modalPop { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes floatIcon { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
  </style>
</head>
<body>

  <div class="header-container">
    <div class="titles-wrapper">
      <h1 class="main-title">Free Fire Items Library</h1>
      <div class="subtitle-wrapper">
        <div class="sub-title">Made By King of Games</div>
        <button id="musicToggle" class="music-btn" title="Toggle Music"></button>
      </div>
    </div>
    
    <div class="controls-wrapper">
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search by item Name, icon & item ID">
        <button id="searchShareBtn" class="search-share-btn" title="Share Search Result">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
        </button>
      </div>
      <div class="filters-row">
        <select id="tagFilter"></select>
        <select id="typeFilter"></select>
        <select id="rarityFilter"></select>
      </div>
    </div>
  </div>
  
  <div class="grid" id="itemsGrid"></div>
  <div class="pagination" id="paginationControls"></div>

  <div id="emptyState" class="empty-state">
    <svg class="empty-icon" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <h2 class="empty-title">NO ITEMS FOUND</h2>
    <p class="empty-desc">Nothing matches your search or filter</p>
    
    <div class="empty-socials-wrapper">
      <h3 class="socials-title">Follow King of Games</h3>
      <div class="social-icons">
        <a href="https://www.instagram.com/_kingofgames02" target="_blank" class="social-btn instagram" title="Instagram">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        </a>
        <a href="https://t.me/FF_MENA_Updates" target="_blank" class="social-btn telegram" title="Telegram">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </a>
        <a href="https://linktr.ee/KingofGames02" target="_blank" class="social-btn linktree" title="Linktree">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M13.636 12L19 7.424 16.892 5 12 9.192 7.108 5 5 7.424 10.364 12H4v3h6.545v7h2.91V15H20v-3h-6.364z"/></svg>
        </a>
      </div>
    </div>
  </div>

  <div id="itemModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content">
      <div class="modal-icon-container">
        <div class="modal-float-wrapper">
          <img id="modalIcon" src="" class="modal-icon" alt="icon">
        </div>
      </div>
      <h2 class="modal-title" id="modalName"></h2>
      <div class="modal-details">
        <div class="single-line-text">
          <strong>Item id:</strong> <span id="modalId"></span>
          <button class="copy-btn" id="btnCopyId" onclick="copyItemId()" title="Copy ID">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
          </button>
        </div>
        <div class="single-line-text"><strong>Icon id:</strong> <span id="modalIconId"></span></div>
        <div class="multi-line-text"><strong>Description:</strong> <span id="modalDesc"></span></div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn btn-share" id="btnShare" title="Share Item">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
        </button>
        <button class="modal-btn btn-dl-icon" id="btnDlIcon" title="Download Icon">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        </button>
        <button class="modal-btn btn-dl-bg" id="btnDlBg" title="Download with Background">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    let itemsData = [], filteredItems = [];
    const validRarities = ["ARTIFACT", "MYTHIC++", "MYTHIC", "EPIC++", "EPIC", "RARE", "UNCOMMON", "COMMON"];
    const defaultBg = "./RareBG_Quality/UNKNOWN.png";
    let currentItem = null, currentPage = 1, itemsPerPage = 80;

    const searchInput = document.getElementById('searchInput');
    const searchShareBtn = document.getElementById('searchShareBtn');
    const tagFilter = document.getElementById('tagFilter');
    const typeFilter = document.getElementById('typeFilter');
    const rarityFilter = document.getElementById('rarityFilter');
    const itemsGrid = document.getElementById('itemsGrid');
    const paginationControls = document.getElementById('paginationControls');
    const emptyState = document.getElementById('emptyState');
    const musicBtn = document.getElementById('musicToggle');

    const copyIconSVG = `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>`;
    const checkIconSVG = `<svg width="18" height="18" fill="none" stroke="#10b981" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>`;
    const svgPlay = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
    const svgMute = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>`;

    let isPlaying = false;
    musicBtn.innerHTML = svgMute;
    const bgMusic = new Audio();
    bgMusic.loop = true;
    const audioExts = ['m4a', 'mp3', 'ogg', 'wav', 'aac', 'flac'];

    async function loadMusic() {
      for (let ext of audioExts) {
        try {
          let res = await fetch(`Music.${ext}`, { method: 'HEAD' });
          if (res.ok) {
            bgMusic.src = `Music.${ext}`;
            break;
          }
        } catch(e) {}
      }
    }

    musicBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if(!bgMusic.src) return;
      if (isPlaying) {
        bgMusic.pause();
        isPlaying = false;
        musicBtn.innerHTML = svgMute;
      } else {
        bgMusic.play();
        isPlaying = true;
        musicBtn.innerHTML = svgPlay;
      }
    });

    fetch('./ItemsData.json')
      .then(r => r.json())
      .then(data => {
        const allItems = Array.isArray(data) ? data : Object.values(data);
        itemsData = allItems.filter(item => item.IconInAB === "IconInCDN" && item.icon && item.icon.trim() !== "");
        setupFilters();
        checkUrlForSharedItem();
        applyFilters();
        loadMusic();
      })
      .catch(error => {
        itemsGrid.innerHTML = '<p style="text-align:center; width:100%; color: #ef4444;">Failed to load ItemsData.json</p>';
      });

    function setupFilters() {
      const tags = new Set();
      const types = new Set();
      const rarities = new Set();
      
      itemsData.forEach(item => {
        if (item.tag && item.tag.trim() !== "") tags.add(item.tag);
        if (item.type && item.type.trim() !== "") types.add(item.type);
        if (item.Rare && item.Rare.trim() !== "") rarities.add(item.Rare);
      });
      
      let tagHtml = `<option value="all">All Tags</option>`;
      Array.from(tags).sort().reverse().forEach(tag => { 
        tagHtml += `<option value="${tag}">${tag}</option>`; 
      });
      tagFilter.innerHTML = tagHtml;

      const typeGroups = [
        ["Bundles", "Top", "Bottom", "Shoe", "Head", "Mask", "Facepaint"],
        ["Weapon Skins", "Fist Skins", "Gloo Walls", "Grenade Skin", "Final Shot", "Weapon Crates"],
        ["Emote", "Super Emote", "Arrival Animation", "Finishing Move", "Look Changer", "Vehicle Skins", "Loot Box", "Bag Skins", "Parachute", "Skyboard", "Skywings", "Hyperbook"],
        ["Banners", "Avatars", "Profile Pin", "Battle Card", "Skill Skins", "Music", "Voice Packs", "Photo Frame", "Avatar Frame", "Photo Pose", "Stickers", "Titles"],
        ["Characters", "Pets", "Spark Pet Vault"],
        ["Bundle Create", "Exchange Tokens", "Loot Crates", "Choice Crates", "Vouchers"]
      ];
      
      let typeHtml = `<option value="all">All Types</option>`;
      const definedTypes = new Set(typeGroups.flat());
      
      typeGroups.forEach((group, index) => {
        const availableInGroup = group.filter(t => types.has(t));
        if (availableInGroup.length > 0) {
          if (index > 0 || typeHtml !== `<option value="all">All Types</option>`) {
             typeHtml += `<option disabled>──────</option>`;
          }
          availableInGroup.forEach(t => {
            typeHtml += `<option value="${t}">${t}</option>`;
          });
        }
      });
      
      const otherTypes = Array.from(types).filter(t => !definedTypes.has(t)).sort();
      if (otherTypes.length > 0) {
        typeHtml += `<option disabled>──────</option>`;
        otherTypes.forEach(t => {
          typeHtml += `<option value="${t}">${t}</option>`;
        });
      }
      typeFilter.innerHTML = typeHtml;

      let rareHtml = `<option value="all">All Rarities</option>`;
      Array.from(rarities).sort().forEach(rare => { 
        rareHtml += `<option value="${rare}">${rare}</option>`; 
      });
      rarityFilter.innerHTML = rareHtml;
    }

    function getRarityBg(rare) {
      if (rare === "NONE") return "./RareBG_Quality/COMMON.png";
      if (!rare || !validRarities.includes(rare)) return defaultBg;
      return `./RareBG_Quality/${rare}.png`;
    }

    function openModal(globalIndex) {
      currentItem = itemsData[globalIndex];
      const modalIconEl = document.getElementById('modalIcon');
      
      modalIconEl.style.transition = 'none';
      modalIconEl.style.opacity = '0';
      modalIconEl.className = 'modal-icon';
      
      modalIconEl.onload = function() {
        if (this.src.includes('UNKNOWN.png')) {
          this.classList.add('unknown-scale');
        } else if (this.naturalWidth === 300 && this.naturalHeight === 90) {
          this.classList.add('weapon-tilt');
        }
        void this.offsetWidth;
        if (!this.src.includes('UNKNOWN.png')) {
          this.style.transition = 'transform 0.3s ease, opacity 0.2s ease';
        }
        this.style.opacity = '1';
      };

      modalIconEl.onerror = function() {
        this.onerror = null;
        this.src = './RareBG_Quality/UNKNOWN.png';
      };
      
      modalIconEl.src = `./icons/${currentItem.itemID}.png`;
      
      const nameStr = currentItem.name || (currentItem.icon || "Unknown");
      const modalNameEl = document.getElementById('modalName');
      modalNameEl.textContent = nameStr;
      let nameLen = nameStr.length;
      if (nameLen < 25) modalNameEl.style.fontSize = '0.95rem';
      else if (nameLen < 35) modalNameEl.style.fontSize = '0.85rem';
      else if (nameLen < 45) modalNameEl.style.fontSize = '0.75rem';
      else modalNameEl.style.fontSize = '0.65rem';

      document.getElementById('modalId').textContent = currentItem.itemID;
      
      const iconStr = currentItem.icon || "N/A";
      const modalIconIdEl = document.getElementById('modalIconId');
      modalIconIdEl.textContent = iconStr;
      let iconLen = iconStr.length;
      if (iconLen < 25) modalIconIdEl.style.fontSize = '0.8rem';
      else if (iconLen < 35) modalIconIdEl.style.fontSize = '0.7rem';
      else if (iconLen < 45) modalIconIdEl.style.fontSize = '0.65rem';
      else if (iconLen < 55) modalIconIdEl.style.fontSize = '0.55rem';
      else modalIconIdEl.style.fontSize = '0.45rem';

      document.getElementById('modalDesc').textContent = currentItem.description || "No description available.";
      
      document.getElementById('btnCopyId').innerHTML = copyIconSVG;
      document.getElementById('itemModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('itemModal').style.display = 'none';
      currentItem = null;
    }

    window.onclick = function(event) {
      if (event.target === document.getElementById('itemModal')) closeModal();
    }

    function copyItemId() {
      if (!currentItem) return;
      navigator.clipboard.writeText(currentItem.itemID).then(() => {
        const copyBtn = document.getElementById('btnCopyId');
        copyBtn.innerHTML = checkIconSVG;
        setTimeout(() => { copyBtn.innerHTML = copyIconSVG; }, 2000);
      });
    }

    function applyFilters() {
      const search = searchInput.value.toLowerCase();
      const tagVal = tagFilter.value;
      const typeVal = typeFilter.value;
      const rareVal = rarityFilter.value;

      const hasSearch = searchInput.value.trim() !== '';
      const hasTag = tagVal !== 'all';
      const hasType = typeVal !== 'all';
      const hasRare = rareVal !== 'all';

      searchShareBtn.style.display = (hasSearch || hasTag || hasType || hasRare) ? 'flex' : 'none';

      filteredItems = itemsData.filter(item => {
        const itemName = (item.name || "").toLowerCase();
        const itemIcon = (item.icon || "").toLowerCase();
        const itemId = (item.itemID || "").toString();
        
        const nameMatch = itemName.includes(search) || itemIcon.includes(search) || itemId.includes(search);
        const tagMatch = tagVal === "all" || item.tag === tagVal;
        const typeMatch = typeVal === "all" || item.type === typeVal;
        const rareMatch = rareVal === "all" || item.Rare === rareVal;
        
        return nameMatch && tagMatch && typeMatch && rareMatch;
      });

      currentPage = 1;
      
      if (filteredItems.length === 0) {
        itemsGrid.style.display = 'none';
        paginationControls.style.display = 'none';
        emptyState.style.display = 'flex';
      } else {
        itemsGrid.style.display = 'grid';
        paginationControls.style.display = 'flex';
        emptyState.style.display = 'none';
        renderPage(currentPage);
      }
    }

    function renderPage(page) {
      currentPage = page;
      const start = (page - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const paginatedItems = filteredItems.slice(start, end);

      let htmlContent = '';
      paginatedItems.forEach((item, index) => {
        const bgData = getRarityBg(item.Rare);
        const iconPath = `./icons/${item.itemID}.png`;
        const delay = (index % 20) * 0.03;
        const globalIndex = itemsData.indexOf(item);
        
        htmlContent += `
          <div class="card" style="background-image: url('${bgData}'); animation-delay: ${delay}s;" onclick="openModal(${globalIndex})">
            <img src="${iconPath}" class="card-icon" loading="lazy" alt="icon" 
                 onload="if(this.naturalWidth === 300 && this.naturalHeight === 90) { this.classList.add('weapon-tilt'); }"
                 onerror="this.onerror=null; this.src='./RareBG_Quality/UNKNOWN.png'; this.classList.remove('weapon-tilt');">
          </div>
        `;
      });
      itemsGrid.innerHTML = htmlContent;
      renderPaginationControls();
    }

    function renderPaginationControls() {
      const totalPages = Math.ceil(filteredItems.length / itemsPerPage);
      if (totalPages <= 1) { paginationControls.innerHTML = ''; return; }

      let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="renderPage(${currentPage - 1})">&laquo; Prev</button>`;
      let startPage = Math.max(1, currentPage - 2);
      let endPage = Math.min(totalPages, currentPage + 2);
      
      if (startPage > 1) {
        html += `<button class="page-btn" onclick="renderPage(1)">1</button>`;
        if (startPage > 2) html += `<span class="page-dots">...</span>`;
      }
      for (let i = startPage; i <= endPage; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="renderPage(${i})">${i}</button>`;
      }
      if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<span class="page-dots">...</span>`;
        html += `<button class="page-btn" onclick="renderPage(${totalPages})">${totalPages}</button>`;
      }
      html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="renderPage(${currentPage + 1})">Next &raquo;</button>`;
      paginationControls.innerHTML = html;
    }

    searchInput.addEventListener('input', applyFilters);
    tagFilter.addEventListener('change', applyFilters);
    typeFilter.addEventListener('change', applyFilters);
    rarityFilter.addEventListener('change', applyFilters);

    document.getElementById('btnShare').addEventListener('click', () => {
      if (!currentItem) return;
      const shareUrl = window.location.origin + window.location.pathname + '?item=' + currentItem.itemID;
      const displayName = currentItem.name || "Free Fire Item";
      if (navigator.share) {
        navigator.share({ title: displayName, text: `Check out this item: ${displayName}`, url: shareUrl });
      } else {
        navigator.clipboard.writeText(shareUrl).then(() => alert('Link copied to clipboard!'));
      }
    });

    searchShareBtn.addEventListener('click', () => {
      const url = new URL(window.location.origin + window.location.pathname);
      if (searchInput.value.trim() !== '') url.searchParams.set('search', searchInput.value.trim());
      if (tagFilter.value !== 'all') url.searchParams.set('tag', tagFilter.value);
      if (typeFilter.value !== 'all') url.searchParams.set('type', typeFilter.value);
      if (rarityFilter.value !== 'all') url.searchParams.set('rare', rarityFilter.value);
      
      if (navigator.share) {
        navigator.share({ title: 'Free Fire Items Search', url: url.toString() });
      } else {
        navigator.clipboard.writeText(url.toString()).then(() => alert('Search link copied to clipboard!'));
      }
    });

    function checkUrlForSharedItem() {
      const params = new URLSearchParams(window.location.search);
      const sharedId = params.get('item');
      const sharedSearch = params.get('search');
      const sharedTag = params.get('tag');
      const sharedType = params.get('type');
      const sharedRare = params.get('rare');
      
      if (sharedSearch !== null) searchInput.value = sharedSearch;
      if (sharedTag !== null) tagFilter.value = sharedTag;
      if (sharedType !== null) typeFilter.value = sharedType;
      if (sharedRare !== null) rarityFilter.value = sharedRare;
      
      if (sharedId) {
        const index = itemsData.findIndex(item => item.itemID.toString() === sharedId);
        if (index !== -1) openModal(index);
      }
    }

    document.getElementById('btnDlIcon').addEventListener('click', () => {
      if (!currentItem) return;
      const a = document.createElement('a');
      a.href = `./icons/${currentItem.itemID}.png`;
      a.download = `${currentItem.itemID}_icon.png`;
      a.click();
    });

    document.getElementById('btnDlBg').addEventListener('click', () => {
      if (!currentItem) return;
      const canvas = document.createElement('canvas');
      canvas.width = 512; canvas.height = 512;
      const ctx = canvas.getContext('2d');
      const bgImg = new Image();
      bgImg.crossOrigin = "Anonymous";
      bgImg.src = getRarityBg(currentItem.Rare);
      
      bgImg.onload = () => {
        ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
        const iconImg = new Image();
        iconImg.crossOrigin = "Anonymous";
        iconImg.src = `./icons/${currentItem.itemID}.png`;
        
        iconImg.onload = () => {
          let drawWidth = iconImg.width;
          let drawHeight = iconImg.height;
          const maxDim = canvas.width * 0.8;
          
          const ratio = Math.min(maxDim / drawWidth, maxDim / drawHeight);
          drawWidth *= ratio;
          drawHeight *= ratio;

          const isWeapon = (iconImg.naturalWidth === 300 && iconImg.naturalHeight === 90);

          ctx.save();
          ctx.translate(canvas.width / 2, canvas.height / 2);
          
          if (isWeapon) {
            ctx.rotate(25 * Math.PI / 180);
            drawWidth *= 1.4;
            drawHeight *= 1.4;
          }
          
          ctx.drawImage(iconImg, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
          ctx.restore();

          const a = document.createElement('a');
          a.href = canvas.toDataURL('image/png');
          a.download = `${currentItem.itemID}_full.png`;
          a.click();
        };
      };
    });
  </script>
</body>
</html>
